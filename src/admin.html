<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpaceBridge - 管理后台</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #0A1628 0%, #1a365d 100%);
      min-height: 100vh;
      color: #fff;
    }
    .header {
      background: rgba(255,255,255,0.05);
      padding: 20px 40px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header h1 {
      font-size: 24px;
      font-weight: 600;
      color: #C9A962;
    }
    .header .status {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .status-dot {
      width: 10px;
      height: 10px;
      background: #10B981;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 30px;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-bottom: 30px;
    }
    .stat-card {
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 24px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .stat-card .number {
      font-size: 36px;
      font-weight: 700;
      color: #C9A962;
    }
    .stat-card .label {
      font-size: 14px;
      color: rgba(255,255,255,0.6);
      margin-top: 8px;
    }
    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    .tab {
      padding: 12px 24px;
      border-radius: 8px;
      border: none;
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.7);
      cursor: pointer;
      transition: all 0.3s;
      font-size: 14px;
    }
    .tab.active {
      background: #C9A962;
      color: #0A1628;
    }
    .tab:hover:not(.active) {
      background: rgba(255,255,255,0.1);
    }
    .table-container {
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.1);
      overflow: hidden;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      padding: 16px;
      text-align: left;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    th {
      background: rgba(255,255,255,0.05);
      font-weight: 600;
      font-size: 14px;
      color: rgba(255,255,255,0.8);
    }
    td {
      font-size: 14px;
      color: rgba(255,255,255,0.7);
    }
    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
    }
    .status-pending {
      background: #F59E0B;
      color: #0A1628;
    }
    .status-processed {
      background: #10B981;
      color: #fff;
    }
    .btn {
      padding: 8px 16px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: all 0.3s;
    }
    .btn-primary {
      background: #C9A962;
      color: #0A1628;
    }
    .btn-danger {
      background: #EF4444;
      color: #fff;
    }
    .btn:hover {
      opacity: 0.9;
    }
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.8);
      justify-content: center;
      align-items: center;
      z-index: 1000;
      backdrop-filter: blur(5px);
    }
    .modal-overlay.active {
      display: flex;
    }
    .modal {
      background: #1a2744;
      border-radius: 16px;
      padding: 30px;
      min-width: 550px;
      max-width: 90vw;
      max-height: 90vh;
      overflow-y: auto;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .modal h2 {
      font-size: 20px;
      margin-bottom: 20px;
      color: #C9A962;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .modal .close-btn {
      float: right;
      background: rgba(255,255,255,0.1);
      border: none;
      color: rgba(255,255,255,0.7);
      font-size: 18px;
      cursor: pointer;
      padding: 8px 12px;
      border-radius: 6px;
      transition: all 0.3s;
    }
    .modal .close-btn:hover {
      background: rgba(255,255,255,0.2);
    }
    .form-group {
      margin-bottom: 15px;
    }
    .form-group label {
      display: block;
      font-size: 14px;
      color: rgba(255,255,255,0.8);
      margin-bottom: 5px;
      font-weight: 500;
    }
    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      color: #fff;
      font-size: 14px;
      font-family: inherit;
    }
    .form-group textarea {
      min-height: 150px;
      resize: vertical;
    }
    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: #C9A962;
    }
    .form-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 25px;
      padding-top: 20px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }
    .empty-state {
      padding: 60px;
      text-align: center;
      color: rgba(255,255,255,0.4);
    }
    .pagination {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 20px;
    }
    .page-btn {
      padding: 8px 16px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.2);
      background: transparent;
      color: #fff;
      cursor: pointer;
      transition: all 0.3s;
    }
    .page-btn:hover:not(.active) {
      background: rgba(255,255,255,0.1);
    }
    .page-btn.active {
      background: #C9A962;
      color: #0A1628;
      border-color: #C9A962;
    }
    .service-type {
      font-size: 12px;
      color: #C9A962;
      background: rgba(201,169,98,0.1);
      padding: 4px 8px;
      border-radius: 4px;
    }
    .detail-section {
      margin-bottom: 20px;
      padding-bottom: 20px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .detail-section:last-child {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }
    .detail-section h3 {
      font-size: 16px;
      color: #C9A962;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .project-info {
      background: rgba(255,255,255,0.03);
      padding: 15px;
      border-radius: 8px;
      margin-top: 10px;
    }
    .project-info div {
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .project-info div:last-child {
      border-bottom: none;
    }
    .project-info span {
      color: rgba(255,255,255,0.5);
      margin-right: 10px;
    }
    @media (max-width: 768px) {
      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
      }
      .container {
        padding: 15px;
      }
      .header {
        padding: 15px;
      }
      th, td {
        padding: 10px 5px;
        font-size: 12px;
      }
      .modal {
        min-width: auto;
        margin: 15px;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🏗️ SpaceBridge 管理后台</h1>
    <div class="status">
      <span class="status-dot"></span>
      <span style="font-size: 14px;">系统运行中</span>
    </div>
  </div>

  <div class="container">
    <div class="stats-grid">
      <div class="stat-card">
        <div class="number" id="totalCount">0</div>
        <div class="label">总咨询数</div>
      </div>
      <div class="stat-card">
        <div class="number" id="pendingCount">0</div>
        <div class="label">待处理</div>
      </div>
      <div class="stat-card">
        <div class="number" id="processedCount">0</div>
        <div class="label">已处理</div>
      </div>
      <div class="stat-card">
        <div class="number" id="todayCount">0</div>
        <div class="label">今日新增</div>
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="showTab('consultation')">咨询列表</button>
      <button class="tab" onclick="showTab('subscriptions')">邮件订阅</button>
      <button class="tab" onclick="showTab('feedback')">反馈建议</button>
    </div>

    <div class="table-container" id="consultationTab">
      <table>
        <thead>
          <tr>
            <th>客户姓名</th>
            <th>联系电话</th>
            <th>邮箱</th>
            <th>服务类型</th>
            <th>状态</th>
            <th>提交时间</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="consultationTable">
        </tbody>
      </table>
      <div class="pagination" id="consultationPagination"></div>
    </div>

    <div class="table-container" id="subscriptionsTab" style="display: none;">
      <table>
        <thead>
          <tr>
            <th>邮箱地址</th>
            <th>状态</th>
            <th>订阅时间</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="subscriptionsTable">
        </tbody>
      </table>
      <div class="pagination" id="subscriptionsPagination"></div>
    </div>

    <div class="table-container" id="feedbackTab" style="display: none;">
      <table>
        <thead>
          <tr>
            <th>姓名</th>
            <th>邮箱</th>
            <th>类型</th>
            <th>主题</th>
            <th>状态</th>
            <th>提交时间</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="feedbackTable">
        </tbody>
      </table>
      <div class="pagination" id="feedbackPagination"></div>
    </div>
  </div>

  <div class="modal-overlay" id="detailModal">
    <div class="modal">
      <button class="close-btn" onclick="closeModal()">&times;</button>
      <h2>📋 咨询详情</h2>
      <div id="modalContent"></div>
      <div class="form-actions">
        <button class="btn btn-primary" onclick="markProcessed()">✅ 标记为已处理</button>
        <button class="btn btn-danger" onclick="deleteItem()">🗑️ 删除</button>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = '/api';
    let currentTab = 'consultation';
    let currentPage = { consultation: 1, subscriptions: 1, feedback: 1 };
    let selectedItem = null;

    const serviceTypeMap = {
      design: '设计方案',
      construction: '施工服务',
      materials: '材料供应',
      consultation: '咨询服务',
      other: '其他'
    };

    const feedbackTypeMap = {
      feedback: '反馈',
      suggestion: '建议',
      complaint: '投诉'
    };

    async function fetchConsultations(page = 1) {
      const response = await fetch(`${API_BASE}/consultation?page=${page}&limit=10`);
      const result = await response.json();
      renderConsultations(result.data, result.pagination);
      updateStats(result.data);
    }

    async function fetchSubscriptions(page = 1) {
      const response = await fetch(`${API_BASE}/subscription?page=${page}&limit=10`);
      const result = await response.json();
      renderSubscriptions(result.data, result.pagination);
    }

    async function fetchFeedback(page = 1) {
      const response = await fetch(`${API_BASE}/feedback?page=${page}&limit=10`);
      const result = await response.json();
      renderFeedback(result.data, result.pagination);
    }

    function renderConsultations(data, pagination) {
      const tbody = document.getElementById('consultationTable');
      if (data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" class="empty-state">暂无咨询数据</td></tr>';
        return;
      }
      tbody.innerHTML = data.map((item, index) => {
        const itemId = `consultation_${index}`;
        return `
          <tr>
            <td>${escapeHtml(item.name)}</td>
            <td><a href="tel:${escapeHtml(item.phone)}" style="color: #C9A962;">${escapeHtml(item.phone)}</a></td>
            <td>${item.email ? escapeHtml(item.email) : '-'}</td>
            <td><span class="service-type">${serviceTypeMap[item.serviceType] || item.serviceType}</span></td>
            <td><span class="status-badge status-${item.status}">${item.status === 'pending' ? '待处理' : '已处理'}</span></td>
            <td>${formatDate(item.createdAt)}</td>
            <td>
              <button class="btn btn-primary" data-item-id="${item.id}">详情</button>
            </td>
          </tr>
        `;
      }).join('');
      
      document.querySelectorAll('.btn-primary[data-item-id]').forEach(btn => {
        btn.addEventListener('click', async function() {
          const id = this.getAttribute('data-item-id');
          await loadAndShowDetail(id);
        });
      });
      
      renderPagination('consultation', pagination);
    }

    async function loadAndShowDetail(id) {
      const response = await fetch(`${API_BASE}/consultation/${id}`);
      const result = await response.json();
      if (result.success && result.data) {
        showDetail('consultation', id, result.data);
      }
    }

    function renderSubscriptions(data, pagination) {
      const tbody = document.getElementById('subscriptionsTable');
      if (data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" class="empty-state">暂无订阅数据</td></tr>';
        return;
      }
      tbody.innerHTML = data.map(item => `
        <tr>
          <td><a href="mailto:${escapeHtml(item.email)}" style="color: #C9A962;">${escapeHtml(item.email)}</a></td>
          <td><span class="status-badge ${item.status === 'active' ? 'status-processed' : 'status-pending'}">${item.status === 'active' ? '活跃' : '已退订'}</span></td>
          <td>${formatDate(item.createdAt)}</td>
          <td>
            <button class="btn btn-danger" onclick="deleteSubscription('${escapeHtml(item.email)}')">删除</button>
          </td>
        </tr>
      `).join('');
      renderPagination('subscriptions', pagination);
    }

    function renderFeedback(data, pagination) {
      const tbody = document.getElementById('feedbackTable');
      if (data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" class="empty-state">暂无反馈数据</td></tr>';
        return;
      }
      tbody.innerHTML = data.map((item, index) => {
        const itemId = `feedback_${index}`;
        return `
          <tr>
            <td>${escapeHtml(item.name)}</td>
            <td>${item.email ? escapeHtml(item.email) : '-'}</td>
            <td><span class="service-type">${feedbackTypeMap[item.type] || item.type}</span></td>
            <td>${escapeHtml(item.subject)}</td>
            <td><span class="status-badge status-${item.status}">${item.status === 'pending' ? '待处理' : '已处理'}</span></td>
            <td>${formatDate(item.createdAt)}</td>
            <td>
              <button class="btn btn-primary" data-feedback-id="${item.id}">详情</button>
            </td>
          </tr>
        `;
      }).join('');
      
      document.querySelectorAll('.btn-primary[data-feedback-id]').forEach(btn => {
        btn.addEventListener('click', async function() {
          const id = this.getAttribute('data-feedback-id');
          const response = await fetch(`${API_BASE}/feedback/${id}`);
          const result = await response.json();
          if (result.success && result.data) {
            showDetail('feedback', id, result.data);
          }
        });
      });
      
      renderPagination('feedback', pagination);
    }

    function renderPagination(tab, pagination) {
      const container = document.getElementById(`${tab}Pagination`);
      if (pagination.totalPages <= 1) {
        container.innerHTML = '';
        return;
      }
      let html = '';
      for (let i = 1; i <= pagination.totalPages; i++) {
        html += `<button class="page-btn ${i === pagination.page ? 'active' : ''}" onclick="changePage('${tab}', ${i})">${i}</button>`;
      }
      container.innerHTML = html;
    }

    function changePage(tab, page) {
      currentPage[tab] = page;
      if (tab === 'consultation') fetchConsultations(page);
      else if (tab === 'subscriptions') fetchSubscriptions(page);
      else if (tab === 'feedback') fetchFeedback(page);
    }

    function showTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelector(`.tab[onclick="showTab('${tab}')"]`).classList.add('active');
      document.querySelectorAll('.table-container').forEach(c => c.style.display = 'none');
      document.getElementById(`${tab}Tab`).style.display = 'block';
      if (currentPage[tab] === undefined) currentPage[tab] = 1;
      if (tab === 'consultation') fetchConsultations(currentPage[tab]);
      else if (tab === 'subscriptions') fetchSubscriptions(currentPage[tab]);
      else if (tab === 'feedback') fetchFeedback(currentPage[tab]);
    }

    function showDetail(type, id, item) {
      selectedItem = { type, id, data: item };
      let content = '';
      
      if (type === 'consultation') {
        const messageParts = parseMessage(item.message);
        
        content = `
          <div class="detail-section">
            <h3>👤 客户信息</h3>
            <div class="form-group">
              <label>客户姓名</label>
              <input type="text" value="${escapeHtml(item.name)}" readonly>
            </div>
            <div class="form-group">
              <label>联系电话</label>
              <input type="text" value="${escapeHtml(item.phone)}" readonly>
            </div>
            <div class="form-group">
              <label>邮箱</label>
              <input type="text" value="${item.email ? escapeHtml(item.email) : '-'}" readonly>
            </div>
            <div class="form-group">
              <label>公司名称</label>
              <input type="text" value="${item.company ? escapeHtml(item.company) : '-'}" readonly>
            </div>
          </div>
          
          <div class="detail-section">
            <h3>📋 需求信息</h3>
            <div class="form-group">
              <label>服务类型</label>
              <input type="text" value="${serviceTypeMap[item.serviceType] || item.serviceType}" readonly>
            </div>
            ${messageParts.projectType ? `<div class="form-group"><label>项目类型</label><input type="text" value="${escapeHtml(messageParts.projectType)}" readonly></div>` : ''}
            ${messageParts.projectAddress ? `<div class="form-group"><label>项目地址</label><input type="text" value="${escapeHtml(messageParts.projectAddress)}" readonly></div>` : ''}
            ${messageParts.projectArea ? `<div class="form-group"><label>项目面积</label><input type="text" value="${escapeHtml(messageParts.projectArea)}" ㎡ readonly></div>` : ''}
            ${messageParts.timeline ? `<div class="form-group"><label>预计工期</label><input type="text" value="${escapeHtml(messageParts.timeline)}" readonly></div>` : ''}
            ${messageParts.budget ? `<div class="form-group"><label>预计预算</label><input type="text" value="${escapeHtml(messageParts.budget)}" readonly></div>` : ''}
          </div>
          
          <div class="detail-section">
            <h3>📝 备注信息</h3>
            <div class="form-group">
              <label>客户留言</label>
              <textarea readonly>${messageParts.notes ? escapeHtml(messageParts.notes) : '-'}</textarea>
            </div>
          </div>
          
          <div class="detail-section">
            <h3>📊 状态信息</h3>
            <div class="form-group">
              <label>当前状态</label>
              <input type="text" value="${item.status === 'pending' ? '待处理' : '已处理'}" readonly>
            </div>
            <div class="form-group">
              <label>提交时间</label>
              <input type="text" value="${formatDate(item.createdAt)}" readonly>
            </div>
            <div class="form-group">
              <label>记录ID</label>
              <input type="text" value="${item.id}" readonly style="font-family: monospace;">
            </div>
          </div>
        `;
      } else if (type === 'feedback') {
        content = `
          <div class="form-group">
            <label>姓名</label>
            <input type="text" value="${escapeHtml(item.name)}" readonly>
          </div>
          <div class="form-group">
            <label>邮箱</label>
            <input type="text" value="${item.email ? escapeHtml(item.email) : '-'}" readonly>
          </div>
          <div class="form-group">
            <label>类型</label>
            <input type="text" value="${feedbackTypeMap[item.type] || item.type}" readonly>
          </div>
          <div class="form-group">
            <label>主题</label>
            <input type="text" value="${escapeHtml(item.subject)}" readonly>
          </div>
          <div class="form-group">
            <label>内容</label>
            <textarea readonly>${escapeHtml(item.message)}</textarea>
          </div>
          <div class="form-group">
            <label>状态</label>
            <input type="text" value="${item.status === 'pending' ? '待处理' : '已处理'}" readonly>
          </div>
        `;
      }
      
      document.getElementById('modalContent').innerHTML = content;
      document.getElementById('detailModal').classList.add('active');
    }

    function parseMessage(message) {
      const parts = {};
      const lines = message.split('\n');
      lines.forEach(line => {
        if (line.includes('项目类型:')) parts.projectType = line.replace('项目类型:', '').trim();
        if (line.includes('项目地址:')) parts.projectAddress = line.replace('项目地址:', '').trim();
        if (line.includes('面积:')) parts.projectArea = line.replace('面积:', '').trim();
        if (line.includes('时间:')) parts.timeline = line.replace('时间:', '').trim();
        if (line.includes('预算:')) parts.budget = line.replace('预算:', '').trim();
        if (line.includes('备注:')) parts.notes = line.replace('备注:', '').trim();
      });
      return parts;
    }

    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function closeModal() {
      document.getElementById('detailModal').classList.remove('active');
      selectedItem = null;
    }

    async function markProcessed() {
      if (!selectedItem) return;
      const response = await fetch(`${API_BASE}/${selectedItem.type}/${selectedItem.id}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status: 'processed' })
      });
      if (response.ok) {
        closeModal();
        if (selectedItem.type === 'consultation') fetchConsultations(currentPage.consultation);
        else if (selectedItem.type === 'feedback') fetchFeedback(currentPage.feedback);
      }
    }

    async function deleteItem() {
      if (!selectedItem) return;
      if (!confirm('确定要删除这条记录吗？此操作不可恢复。')) return;
      const response = await fetch(`${API_BASE}/${selectedItem.type}/${selectedItem.id}`, {
        method: 'DELETE'
      });
      if (response.ok) {
        closeModal();
        if (selectedItem.type === 'consultation') fetchConsultations(currentPage.consultation);
        else if (selectedItem.type === 'feedback') fetchFeedback(currentPage.feedback);
      }
    }

    async function deleteSubscription(email) {
      if (!confirm('确定要删除这个订阅吗？')) return;
      const response = await fetch(`${API_BASE}/subscription/${email}`, {
        method: 'DELETE'
      });
      if (response.ok) {
        fetchSubscriptions(currentPage.subscriptions);
      }
    }

    function updateStats(data) {
      const total = data.length;
      const pending = data.filter(d => d.status === 'pending').length;
      const processed = data.filter(d => d.status === 'processed').length;
      const today = data.filter(d => isToday(d.createdAt)).length;
      document.getElementById('totalCount').textContent = total;
      document.getElementById('pendingCount').textContent = pending;
      document.getElementById('processedCount').textContent = processed;
      document.getElementById('todayCount').textContent = today;
    }

    function formatDate(dateString) {
      const date = new Date(dateString);
      return date.toLocaleString('zh-CN', {
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    function isToday(dateString) {
      const date = new Date(dateString);
      const today = new Date();
      return date.toDateString() === today.toDateString();
    }

    document.addEventListener('DOMContentLoaded', () => {
      fetchConsultations(1);
    });
  </script>
</body>
</html>
